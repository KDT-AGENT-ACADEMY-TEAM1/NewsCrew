services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: newscrew-app
    init: true
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 1234
      DB_NAME: mydatabase
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_BASE: http://127.0.0.1:8000
      CHROMA_DB_DIR: /app/.chroma
      RAG_SOURCE_FILE: /app/data/company_vector_seed_kr_listed_20.txt
      TZ: Asia/Seoul
    ports:
      - "8000:8000"
      - "8501:8501"
    volumes:
      - chroma_data:/app/.chroma

  mysql:
    image: mysql:8.0
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: dbuser
      MYSQL_PASSWORD: dbpassword
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  chroma_data:
