    # 📰 뉴스레터 리서치 작업 템플릿 (Newsletter Research Work Template)
이 템플릿은 특정 주제에 대한 뉴스레터를 발행하기 전, 체계적이고 깊이 있는 리서치를 수행하고 이를 스토리라인으로 연결하기 위해 설계되었습니다. 각 섹션의 빈칸을 채워가며 리서치를 진행해 보세요.

---
## 1. 리서치 기획 및 방향성 설정 (Planning)

리서치를 시작하기 전, 이번 뉴스레터의 목적과 타겟 독자를 명확히 정의합니다.

* **발행일 / 호수:** 예) 2026년 06월 25일 / 제 15호
* **메인 주제:** * **타겟 독자:** * **이번 호의 핵심 목표:** 독자에게 전달하고자 하는 핵심 메시지 한 줄
* **핵심 질문 (Key Questions):** 이번 리서치를 통해 반드시 답을 찾아야 하는 질문 3~5가지
