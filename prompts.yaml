## 2. 소스 및 키워드 매핑 (Source & Keyword Mapping)

신뢰할 수 있는 정보를 얻기 위해 검색에 사용할 키워드와 타겟 채널을 정의합니다.

| 카테고리 | 핵심 검색어 (Keywords) | 주요 수집 소스 (Sources) | 검토 여부 (Y/N) |

| :--- | :--- | :--- | :---: |

| **국내 동향** | `주제 + 트렌드`, `주제 + 시장 전망` | 네이버 뉴스, 언론사 보도자료, 국내 전문 블로그 | |

| **해외 동향** | `Topic + Trends 2026`, `Topic + Analysis` | Google News, TechCrunch, Medium, Reddit 등 | |

| **학술/데이터** | `Topic + Report`, `Topic + Statistics` | 통계청, McKinsey, Gartner, arXiv 연구소 리포트 | |

| **커뮤니티/SNS**| `주제 반응`, `인플루언서 의견` | X(트위터), LinkedIn, 관련 오픈 카톡방/디스코드 | |

